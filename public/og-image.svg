<?xml version="1.0" encoding="UTF-8"?>
<!--
============================================
File Creation/Modification Notes
============================================
Creation Reason:
  Provide a maintainable source asset for the official AeroNyx social preview
  image. The generated PNG sibling is used by Open Graph and Twitter cards.

Main Functionality:
  - Presents the protocol-first homepage narrative as a 1200x630 preview card.
  - Uses the same AeroNyx mark, dark protocol grid, and blind-boundary language
    used across the website, docs, and nodeboard surfaces.

Important Note for Next Developer:
  - Keep this SVG and public/og-image.png visually aligned.
  - Regenerate the PNG after editing this SVG.
  - Do not add claims here that are not visible on the homepage or docs.

Last Modified: v1.0 - Initial protocol social preview source
Last Modified: v1.1 - Refined 1200x630 composition for social cards
============================================
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AeroNyx social preview</title>
  <desc id="desc">The encrypted coordination layer for autonomous agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08080D"/>
      <stop offset="0.52" stop-color="#0D0D16"/>
      <stop offset="1" stop-color="#07070B"/>
    </linearGradient>
    <radialGradient id="purpleGlow" cx="86%" cy="12%" r="46%">
      <stop offset="0" stop-color="#7762F3" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#7762F3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="16%" cy="86%" r="44%">
      <stop offset="0" stop-color="#20D3B3" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#20D3B3" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9788F7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#9788F7" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#9788F7" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="gridFade">
      <ellipse cx="690" cy="300" rx="560" ry="420"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#purpleGlow)"/>
  <rect width="1200" height="630" fill="url(#greenGlow)"/>
  <g clip-path="url(#gridFade)" opacity="0.7">
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <g opacity="0.64">
    <rect x="504" y="150" width="620" height="1" fill="url(#line)" transform="rotate(21 504 150)"/>
    <rect x="560" y="412" width="540" height="1" fill="url(#line)" transform="rotate(-18 560 412)"/>
    <rect x="724" y="292" width="420" height="1" fill="url(#line)" transform="rotate(72 724 292)" opacity="0.45"/>
  </g>
  <g fill="#9C8BFF" filter="url(#softGlow)">
    <circle cx="812" cy="120" r="4.5"/>
    <circle cx="1026" cy="226" r="4.5"/>
    <circle cx="902" cy="472" r="4.5"/>
    <circle cx="690" cy="360" r="4" opacity="0.7"/>
  </g>

  <g transform="translate(76 68)">
    <rect width="46" height="46" fill="#7762F3" fill-opacity="0.12" stroke="#9788F7" stroke-opacity="0.38"/>
    <g transform="translate(12 12) scale(0.038)" fill="#9C8BFF" opacity="0.72">
      <path d="M1277 3833 l-1277 -1278 0 -1275 0 -1275 1280 1280 1280 1280 -2 1273 -3 1272 -1278 -1277z"/>
      <path d="M3838 3833 l-1278 -1278 0 -1275 0 -1275 1280 1280 1280 1280 -2 1273 -3 1272 -1277 -1277z"/>
    </g>
    <text x="64" y="30" fill="#F7F7FF" fill-opacity="0.88" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700" letter-spacing="4.5">AERONYX</text>
  </g>

  <g transform="translate(76 188)">
    <rect width="252" height="36" fill="#7762F3" fill-opacity="0.10" stroke="#9788F7" stroke-opacity="0.38"/>
    <circle cx="20" cy="18" r="3.5" fill="#20D3B3" filter="url(#softGlow)"/>
    <text x="36" y="23" fill="#B8AEFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" letter-spacing="2.3">BLIND OPEN PROTOCOL</text>
  </g>

  <g transform="translate(70 74)" opacity="0.23">
    <g transform="scale(0.088)" fill="#9C8BFF">
      <path d="M1277 3833 l-1277 -1278 0 -1275 0 -1275 1280 1280 1280 1280 -2 1273 -3 1272 -1278 -1277z"/>
      <path d="M3838 3833 l-1278 -1278 0 -1275 0 -1275 1280 1280 1280 1280 -2 1273 -3 1272 -1277 -1277z"/>
    </g>
  </g>

  <text x="76" y="286" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="530" letter-spacing="-1.1">
    <tspan x="76" dy="0">The encrypted</tspan>
    <tspan x="76" dy="62">coordination layer</tspan>
    <tspan x="76" dy="62">for autonomous agents.</tspan>
  </text>

  <text x="76" y="470" fill="#FFFFFF" fill-opacity="0.62" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="390">
    <tspan x="76" dy="0">Route traffic, exchange encrypted messages,</tspan>
    <tspan x="76" dy="31">preserve private memory, and coordinate</tspan>
    <tspan x="76" dy="31">work through a blind, open protocol.</tspan>
  </text>

  <g transform="translate(78 592)" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" letter-spacing="1.7" fill="#FFFFFF" fill-opacity="0.64">
    <rect x="0" y="-27" width="146" height="38" fill="#FFFFFF" fill-opacity="0.035" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="15" y="-3">PRIVACY NETWORK</text>
    <rect x="158" y="-27" width="96" height="38" fill="#FFFFFF" fill-opacity="0.035" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="173" y="-3">MEMCHAIN</text>
    <rect x="266" y="-27" width="176" height="38" fill="#FFFFFF" fill-opacity="0.035" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="281" y="-3">AGENT COORDINATION</text>
  </g>

  <g transform="translate(806 392)">
    <rect width="318" height="172" fill="#08080D" fill-opacity="0.72" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <line x1="0" y1="0" x2="312" y2="0" stroke="#9788F7" stroke-opacity="0.5"/>
    <text x="22" y="36" fill="#FFFFFF" fill-opacity="0.38" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" letter-spacing="2">PROTOCOL BOUNDARY</text>
    <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">
      <line x1="22" y1="62" x2="290" y2="62" stroke="#FFFFFF" stroke-opacity="0.08"/>
      <text x="22" y="88" fill="#FFFFFF" fill-opacity="0.55">Payloads</text>
      <text x="210" y="88" fill="#C8C2FF" font-weight="700">Encrypted</text>
      <line x1="22" y1="104" x2="290" y2="104" stroke="#FFFFFF" stroke-opacity="0.08"/>
      <text x="22" y="130" fill="#FFFFFF" fill-opacity="0.55">Memory</text>
      <text x="205" y="130" fill="#C8C2FF" font-weight="700">Node-blind</text>
      <line x1="22" y1="146" x2="290" y2="146" stroke="#FFFFFF" stroke-opacity="0.08"/>
      <text x="22" y="160" fill="#FFFFFF" fill-opacity="0.55">Telemetry</text>
      <text x="211" y="160" fill="#C8C2FF" font-weight="700">Aggregate</text>
    </g>
  </g>
</svg>
